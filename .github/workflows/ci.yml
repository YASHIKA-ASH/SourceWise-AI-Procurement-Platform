name: SourceWise CI/CD

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:

  test:

    runs-on: ubuntu-latest

    services:

      postgres:

        image: postgres:15

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sourcewise

        ports:
          - 5432:5432

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests

        run: |

          pytest

      - name: Build Docker Image

        run: |

          docker build -t sourcewise .

- name: Deploy

  uses: appleboy/ssh-action@v1

  with:

    host: ${{ secrets.HOST }}

    username: ubuntu

    key: ${{ secrets.KEY }}

    script: |

      cd SourceWise

      git pull

      docker compose down

      docker compose up -d --build